<!DOCTYPE html>

<head>
<meta charset="utf-8">
<title>Icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper-1); padding: 22px 24px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 4px; border-radius: var(--r-md); background: var(--paper-0); border: 1px solid var(--line-soft); }
  .item svg { width: 22px; height: 22px; stroke: var(--ink-1); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .lbl { font: var(--t-micro); color: var(--ink-3); }
</style>
</head>
