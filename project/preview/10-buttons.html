<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper-1); padding: 22px 24px; font-family: var(--font-body); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; height: 40px; padding: 0 18px; border-radius: var(--r-pill); font: var(--t-body-sm); font-weight: 600; border: none; cursor: pointer; transition: all var(--t-base) var(--ease-out); }
  .primary { background: var(--accent); color: #FFFEFB; }
  .primary:hover { background: var(--accent-press); }
  .secondary { background: var(--paper-2); color: var(--ink-1); }
  .secondary:hover { background: var(--paper-3); }
  .ghost { background: transparent; color: var(--ink-1); border: 1px solid var(--line); }
  .ghost:hover { background: var(--paper-2); }
  .text { background: transparent; color: var(--accent); padding: 0 4px; height: 32px; }
  .icon { width: 40px; height: 40px; padding: 0; justify-content: center; background: var(--paper-2); color: var(--ink-1); }
  .sm { height: 32px; padding: 0 14px; font-size: 12px; }
</style>
</head>
<body class="pl-paper">
  <div class="row">
    <button class="btn primary">픽 추가</button>
    <button class="btn secondary">팔로우</button>
    <button class="btn ghost">프로필 편집</button>
    <button class="btn text">폴더 수정</button>
    <button class="btn icon">⚙</button>
  </div>
  <div class="row">
    <button class="btn primary sm">저장</button>
    <button class="btn secondary sm">취소</button>
    <button class="btn ghost sm">+ 폴더</button>
  </div>
</body>
</html>
