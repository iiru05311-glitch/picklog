<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper-1); padding: 22px 28px; font-family: var(--font-body); }
  .row { display: flex; align-items: center; gap: 12px; height: 22px; }
  .name { font: var(--t-meta); color: var(--ink-2); font-family: var(--font-mono); width: 38px; }
  .px { font: var(--t-micro); color: var(--ink-3); font-family: var(--font-mono); width: 32px; }
  .bar { background: var(--accent); height: 12px; border-radius: 4px; }
  .stack { display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body class="pl-paper">
  <div class="stack">
    <div class="row"><div class="name">s-1</div><div class="px">4</div><div class="bar" style="width: 4px;"></div></div>
    <div class="row"><div class="name">s-2</div><div class="px">8</div><div class="bar" style="width: 8px;"></div></div>
    <div class="row"><div class="name">s-3</div><div class="px">12</div><div class="bar" style="width: 12px;"></div></div>
    <div class="row"><div class="name">s-4</div><div class="px">16</div><div class="bar" style="width: 16px;"></div></div>
    <div class="row"><div class="name">s-5</div><div class="px">20</div><div class="bar" style="width: 20px;"></div></div>
    <div class="row"><div class="name">s-6</div><div class="px">24</div><div class="bar" style="width: 24px;"></div></div>
    <div class="row"><div class="name">s-8</div><div class="px">32</div><div class="bar" style="width: 32px;"></div></div>
    <div class="row"><div class="name">s-10</div><div class="px">40</div><div class="bar" style="width: 40px;"></div></div>
    <div class="row"><div class="name">s-12</div><div class="px">48</div><div class="bar" style="width: 48px;"></div></div>
  </div>
</body>
</html>
