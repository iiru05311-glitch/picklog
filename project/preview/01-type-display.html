<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Type · Display</title>
<style>
  @font-face { font-family: "Cafe24 Behappy"; src: url("../fonts/Cafe24Behappy.ttf") format("truetype"); font-display: swap; }
  html, body { margin: 0; }
  body { background: #FFFFFF; padding: 24px 32px; font-family: "Pretendard", -apple-system, sans-serif; color: #1A1A1C; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .label { font-size: 11px; color: #8A8B91; width: 88px; letter-spacing: 0.06em; text-transform: uppercase; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .display { font-family: "Cafe24 Behappy", "Gowun Dodum", sans-serif; color: #1A1A1C; font-weight: 400; }
  .italic-em { font-family: "Instrument Serif", serif; font-style: italic; }
  .red { color: #D6517F; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row">
      <div class="label">Display 32</div>
      <div class="display" style="font-size: 32px; line-height: 1.1;">픽한 것들의 기록</div>
    </div>
    <div class="row">
      <div class="label">H1 22</div>
      <div class="display" style="font-size: 22px; line-height: 1.2;">오늘의 픽 <span class="italic-em">moments</span></div>
    </div>
    <div class="row">
      <div class="label">Hand 16</div>
      <div class="display red" style="font-size: 16px; line-height: 1.2;">새로 저장한 링크들</div>
    </div>
  </div>
</body>
</html>
