<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Folder Row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper-1); padding: 22px 28px; font-family: var(--font-body); }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .title { font: var(--t-h2); color: var(--ink-1); font-weight: 600; }
  .edit { font: var(--t-body-sm); color: var(--accent); display: inline-flex; align-items: center; gap: 4px; }
  .edit svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .list { background: var(--paper-0); border: 1px solid var(--line-soft); border-radius: var(--r-lg); box-shadow: var(--sh-1); overflow: hidden; }
  .row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line-soft); }
  .row:last-child { border-bottom: none; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .name { font: var(--t-body); color: var(--ink-1); flex: 1; }
  .count { font: var(--t-body-sm); color: var(--ink-3); font-variant-numeric: tabular-nums; }
  .arrow { color: var(--ink-4); font-size: 16px; line-height: 1; }
</style>
</head>
<body class="pl-paper">
  <div class="header">
    <div class="title">보관함</div>
    <div class="edit">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      폴더 수정
    </div>
  </div>
  <div class="list">
    <div class="row"><div class="dot" style="background: #C98B8B;"></div><div class="name">패션</div><div class="count">12</div><div class="arrow">›</div></div>
    <div class="row"><div class="dot" style="background: #92B09C;"></div><div class="name">뷰티</div><div class="count">7</div><div class="arrow">›</div></div>
    <div class="row"><div class="dot" style="background: #8FA3BF;"></div><div class="name">식품</div><div class="count">2</div><div class="arrow">›</div></div>
  </div>
</body>
</html>
