<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><title>Colors · Ink</title>
<style>
  html, body { margin: 0; }
  body { background: #FFFFFF; padding: 24px; font-family: "Pretendard", sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border-radius: 14px; aspect-ratio: 1.5 / 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
  .name { font-size: 12px; font-weight: 600; color: #FFFFFF; }
  .hex { font-size: 11px; color: rgba(255,255,255,0.7); font-family: ui-monospace, Menlo, monospace; margin-top: 1px; }
</style></head>
<body>
  <div class="grid">
    <div class="swatch" style="background: #1A1A1C;"><span class="name">ink-1</span><span class="hex">#1A1A1C</span></div>
    <div class="swatch" style="background: #4F5056;"><span class="name">ink-2</span><span class="hex">#4F5056</span></div>
    <div class="swatch" style="background: #8A8B91;"><span class="name">ink-3</span><span class="hex">#8A8B91</span></div>
    <div class="swatch" style="background: #B8B9BE;"><span class="name">ink-4</span><span class="hex">#B8B9BE</span></div>
  </div>
</body></html>
