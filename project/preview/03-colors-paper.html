<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Colors · Paper</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: #FFFFFF; padding: 28px 32px; font-family: var(--font-body); color: var(--ink-1); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .swatch { border-radius: 14px; aspect-ratio: 1 / 1; border: 1px solid #EFEDE7; box-shadow: 0 1px 2px rgba(20, 18, 14, 0.03); display: flex; align-items: flex-end; padding: 10px; }
  .info { display: flex; flex-direction: column; gap: 2px; }
  .name { font-size: 11px; font-weight: 600; color: #1F1A14; letter-spacing: 0.01em; }
  .hex { font-size: 10px; color: #8C8170; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch" style="background: #FFFFFF;"><div class="info"><span class="name">paper-0</span><span class="hex">#FFFFFF</span></div></div>
    <div class="swatch" style="background: #FBFAF8;"><div class="info"><span class="name">paper-1</span><span class="hex">#FBFAF8</span></div></div>
    <div class="swatch" style="background: #F3F1ED;"><div class="info"><span class="name">paper-2</span><span class="hex">#F3F1ED</span></div></div>
    <div class="swatch" style="background: #E9E6DF;"><div class="info"><span class="name">paper-3</span><span class="hex">#E9E6DF</span></div></div>
    <div class="swatch" style="background: #EFEDE7;"><div class="info"><span class="name">line-soft</span><span class="hex">#EFEDE7</span></div></div>
    <div class="swatch" style="background: #E2DED5;"><div class="info"><span class="name">line</span><span class="hex">#E2DED5</span></div></div>
  </div>
</body>
</html>
