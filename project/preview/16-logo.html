<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><title>Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; }
  body { background: #FFFFFF; padding: 28px 32px; font-family: "Pretendard", sans-serif; display: flex; align-items: flex-end; gap: 36px; flex-wrap: wrap; }
  .group { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .label { font-size: 11px; color: #8A8B91; letter-spacing: 0.06em; text-transform: uppercase; }
  .icon { width: 84px; height: 84px; border-radius: 20px; display: block; box-shadow: 0 4px 14px rgba(201, 132, 152, 0.18); }
  .wm { font-size: 34px; color: #C98498; line-height: 1; letter-spacing: -0.02em; font-weight: 600; }
  .wm-outfit { font-family: "Outfit", sans-serif; font-weight: 600; }
  .wm-jakarta { font-family: "Plus Jakarta Sans", sans-serif; font-weight: 700; }
  .wm-fraunces { font-family: "Fraunces", serif; font-weight: 600; font-variation-settings: "opsz" 100; }
  .wm-dmserif { font-family: "DM Serif Display", serif; font-weight: 400; }
</style></head>
<body>
  <div class="group">
    <img class="icon" src="../assets/logo-icon.png" alt="Pick Log">
    <span class="label">app icon</span>
  </div>
  <div class="group"><div class="wm wm-outfit">Pick-Log</div><span class="label">Outfit</span></div>
  <div class="group"><div class="wm wm-jakarta">Pick-Log</div><span class="label">Plus Jakarta</span></div>
  <div class="group"><div class="wm wm-fraunces">Pick-Log</div><span class="label">Fraunces</span></div>
  <div class="group"><div class="wm wm-dmserif">Pick-Log</div><span class="label">DM Serif</span></div>
</body></html>
