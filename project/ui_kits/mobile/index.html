<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pick Log — Mobile UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Library.jsx"></script>
<script type="text/babel" src="Profile.jsx"></script>
<script type="text/babel" src="Discover.jsx"></script>
<script type="text/babel" src="Save.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

function App() {
  const [tab, setTab] = useState("home");
  const [sheetOpen, setSheetOpen] = useState(false);
  const [toast, setToast] = useState(false);

  const handleSaved = () => {
    setToast(true);
    setTimeout(() => setToast(false), 1800);
  };

  const Screen =
    tab === "home" ? HomeScreen :
    tab === "library" ? LibraryScreen :
    tab === "profile" ? ProfileScreen :
    tab === "discover" ? DiscoverScreen :
    HomeScreen;

  return (
    <div className="pl-app" data-screen-label="Pick Log mobile">
      <Screen />
      <PL.TabBar tab={tab} onTab={setTab} onSave={() => setSheetOpen(true)} />
      <SaveSheet open={sheetOpen} onClose={() => setSheetOpen(false)} onSaved={handleSaved} />
      <div className={`pl-toast ${toast ? "on" : ""}`}>
        <span className="pl-toast-check">
          <svg fill="none" strokeWidth="2.5" viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round" stroke="currentColor"><path d="m5 12 5 5L20 7"/></svg>
        </span>
        저장됨
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
