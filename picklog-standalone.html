<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pick Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Gowun+Batang:wght@400;700&family=Instrument+Serif:ital@0;1&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --paper-0:#FFFFFF; --paper-1:#FBFAF8; --paper-2:#F3F1ED; --paper-3:#E9E6DF;
  --line:#E2DED5; --line-soft:#EFEDE7;
  --ink-1:#1A1A1C; --ink-2:#4F5056; --ink-3:#8A8B91; --ink-4:#B8B9BE;
  --accent:#C98498; --accent-press:#B06C82; --accent-soft:#F2E1E6; --accent-ink:#7A4655;
  --cat-fashion:#C98B8B; --cat-beauty:#92B09C; --cat-food:#8FA3BF; --cat-etc:#D6BD7F;
  --r-xs:6px; --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px; --r-pill:999px;
  --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:20px; --s-6:24px; --s-8:32px;
  --sh-1:0 1px 0 rgba(76,56,28,.04),0 1px 2px rgba(76,56,28,.05);
  --sh-2:0 2px 6px rgba(76,56,28,.06),0 1px 2px rgba(76,56,28,.04);
  --sh-3:0 8px 20px rgba(76,56,28,.08),0 2px 4px rgba(76,56,28,.04);
  --sh-lift:0 16px 40px rgba(76,56,28,.12),0 4px 10px rgba(76,56,28,.06);
  --sh-inset:inset 0 1px 2px rgba(76,56,28,.08);
  --font-display:"Manrope","Pretendard",sans-serif;
  --font-body:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI","Helvetica Neue",sans-serif;
  --font-hand:"Caveat","Gowun Batang",cursive;
  --font-mono:ui-monospace,"SF Mono",Menlo,monospace;
  --t-h3:600 18px/1.35 var(--font-body);
  --t-body:15px/1.55 var(--font-body);
  --t-body-sm:13px/1.5 var(--font-body);
  --t-meta:12px/1.4 var(--font-body);
  --t-micro:11px/1.3 var(--font-body);
  --ease-out:cubic-bezier(.2,.7,.2,1);
  --t-fast:120ms; --t-base:200ms; --t-slow:320ms;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font-body);color:var(--ink-1);background:#e8e4de;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
button{font:inherit;color:inherit;cursor:pointer}
input,textarea{font:inherit;color:inherit}
h1,h2,h3,h4,p{margin:0}

/* Phone */
.pl-app{width:390px;height:844px;background:#fff;border-radius:50px;position:relative;overflow:hidden;box-shadow:0 0 0 10px #1a1512,0 0 0 13px #2d2820,0 32px 80px rgba(0,0,0,.55);flex-shrink:0}
.pl-screen{position:absolute;inset:0;display:flex;flex-direction:column;background:#fff}
.pl-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pl-scroll::-webkit-scrollbar{width:0}
.pl-bottom-pad{height:110px}

/* Top bar */
.pl-topbar{display:flex;align-items:center;justify-content:space-between;padding:56px 20px 14px;gap:12px;position:sticky;top:0;z-index:5;background:#fff}
.pl-wordmark{font-family:"Manrope",sans-serif;font-weight:700;font-size:20px;color:var(--accent);display:inline-flex;align-items:center;gap:4px;line-height:1;letter-spacing:-.03em;flex-shrink:0}
.pl-wordmark-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);display:inline-block}
.pl-topbar-title{font:var(--t-h3);color:var(--ink-1);flex:1;text-align:center}
.pl-topbar-right{display:flex;gap:4px;flex-shrink:0}
.pl-iconbtn{width:36px;height:36px;border:none;background:transparent;color:var(--ink-1);display:inline-flex;align-items:center;justify-content:center;border-radius:var(--r-pill)}
.pl-iconbtn:active{background:var(--paper-2)}
.pl-iconbtn-bordered{border:1px solid var(--line);background:var(--paper-0)}

/* Welcome */
.pl-welcome{padding:4px 20px 20px}
.pl-welcome-title{font-family:var(--font-display);font-weight:400;font-size:32px;line-height:1.1;letter-spacing:-.01em;color:var(--ink-1);margin:0}

/* Sections */
.pl-section{padding:16px 20px 8px}
.pl-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
.pl-section-head h2{font:var(--t-h3);margin:0;color:var(--ink-1);white-space:nowrap}
.pl-text-btn{background:none;border:none;padding:4px 0;font:var(--t-body-sm);color:var(--ink-2);display:inline-flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0}
.pl-text-btn-accent{color:var(--accent);font-weight:600}
.pl-text-btn:disabled{color:var(--ink-4)}

/* Thumb & Avatar */
.pl-thumb{background:var(--paper-2);display:flex;align-items:center;justify-content:center;color:var(--ink-4);flex-shrink:0}
.pl-thumb-sm{width:44px;height:44px;border-radius:var(--r-sm)}
.pl-thumb-md{width:56px;height:56px;border-radius:var(--r-md)}
.pl-thumb-tile{width:100%;aspect-ratio:1;border-radius:var(--r-md)}
.pl-thumb[data-cat="fashion"]{background:color-mix(in srgb,var(--cat-fashion) 24%,var(--paper-2))}
.pl-thumb[data-cat="beauty"]{background:color-mix(in srgb,var(--cat-beauty) 24%,var(--paper-2))}
.pl-thumb[data-cat="food"]{background:color-mix(in srgb,var(--cat-food) 24%,var(--paper-2))}
.pl-thumb[data-cat="etc"]{background:color-mix(in srgb,var(--cat-etc) 24%,var(--paper-2))}
.pl-avatar{background:var(--paper-3);border-radius:50%;flex-shrink:0}
.pl-avatar-md{width:48px;height:48px}
.pl-avatar-lg{width:84px;height:84px}
.pl-cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
.pl-cat-dot[data-cat="fashion"]{background:var(--cat-fashion)}
.pl-cat-dot[data-cat="beauty"]{background:var(--cat-beauty)}
.pl-cat-dot[data-cat="food"]{background:var(--cat-food)}
.pl-cat-dot[data-cat="etc"]{background:var(--cat-etc)}
.pl-cat-dot-lg{width:28px;height:28px}

/* Rank */
.pl-rank-list{display:flex;flex-direction:column;gap:8px}
.pl-rank-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--paper-0);border:1px solid var(--line-soft);border-radius:var(--r-lg);box-shadow:var(--sh-1);width:100%;text-align:left;transition:transform var(--t-fast) var(--ease-out),box-shadow var(--t-base) var(--ease-out)}
.pl-rank-row:active{transform:scale(.98);box-shadow:var(--sh-inset)}
.pl-rank-num{font-family:"Manrope",sans-serif;font-weight:700;font-size:18px;color:var(--ink-3);width:24px;text-align:center;line-height:1}
.pl-rank-num.top{color:var(--accent)}
.pl-rank-body{flex:1;min-width:0}
.pl-rank-name{font:var(--t-body);font-weight:600;color:var(--ink-1)}
.pl-rank-by{font:var(--t-meta);color:var(--ink-3);margin-top:1px}
.pl-dday{font:var(--t-micro);font-weight:600;color:var(--ink-3);background:var(--paper-2);padding:4px 9px;border-radius:var(--r-pill)}

/* H-scroll */
.pl-h-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin:0 -20px;padding-left:20px;padding-right:20px}
.pl-h-scroll::-webkit-scrollbar{display:none}
.pl-user-card{flex:0 0 96px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;background:var(--paper-0);border:1px solid var(--line-soft);border-radius:var(--r-lg);box-shadow:var(--sh-1)}
.pl-user-name{font:var(--t-body-sm);font-weight:600;color:var(--ink-1);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-user-meta{font:var(--t-micro);color:var(--ink-3)}

/* Tab bar */
.pl-tabbar{position:absolute;bottom:0;left:0;right:0;height:90px;display:grid;grid-template-columns:repeat(5,1fr);align-items:start;background:var(--paper-0);border-top:1px solid var(--line-soft);padding-top:10px;padding-bottom:22px;z-index:10}
.pl-tab{display:flex;flex-direction:column;align-items:center;gap:4px;background:transparent;border:none;color:var(--ink-3);padding:4px;transition:color var(--t-fast) var(--ease-out)}
.pl-tab span{font:var(--t-micro);font-weight:500;white-space:nowrap}
.pl-tab[data-on="true"]{color:var(--ink-1)}
.pl-tab-spacer{position:relative;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
.pl-fab{position:absolute;top:-22px;width:56px;height:56px;border-radius:50%;background:var(--ink-1);color:var(--paper-0);display:flex;align-items:center;justify-content:center;border:none;box-shadow:var(--sh-3);transition:transform var(--t-fast) var(--ease-out)}
.pl-fab:active{transform:scale(.94)}
.pl-fab-label{position:absolute;top:42px;font:var(--t-micro);color:var(--ink-3);font-weight:500}

/* Pill tabs */
.pl-pill-tabs{display:inline-flex;background:var(--paper-2);padding:4px;border-radius:var(--r-pill);gap:2px}
.pl-pill-tabs button{border:none;background:transparent;padding:8px 18px;border-radius:var(--r-pill);font:var(--t-body-sm);font-weight:600;color:var(--ink-3);transition:all var(--t-fast) var(--ease-out)}
.pl-pill-tabs button.on{background:var(--paper-0);color:var(--ink-1);box-shadow:var(--sh-1)}

/* Library */
.pl-page-head{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 14px}
.pl-page-title{font-size:26px;line-height:1.18;font-family:var(--font-body);font-weight:700;margin:0;color:var(--ink-1)}
.pl-folder-list{background:var(--paper-0);border:1px solid var(--line-soft);border-radius:var(--r-lg);margin:0 20px;box-shadow:var(--sh-1);overflow:hidden}
.pl-folder-row{width:100%;display:flex;align-items:center;gap:12px;padding:14px 18px;background:transparent;border:none;border-bottom:1px solid var(--line-soft);text-align:left;transition:background var(--t-fast) var(--ease-out)}
.pl-folder-row:last-child{border-bottom:none}
.pl-folder-row:active{background:var(--paper-2)}
.pl-folder-name{font:var(--t-body);color:var(--ink-1);flex:1}
.pl-muted{color:var(--ink-3)}
.pl-folder-count{font:var(--t-body-sm);color:var(--ink-3)}
.pl-folder-arrow{color:var(--ink-4);font-size:16px;line-height:1}
.pl-folder-add-icon{width:24px;height:24px;border-radius:50%;background:var(--paper-2);color:var(--ink-2);display:flex;align-items:center;justify-content:center}
.pl-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pl-pick-card{display:flex;flex-direction:column;gap:6px}
.pl-pick-name{font:var(--t-body-sm);font-weight:600;color:var(--ink-1)}
.pl-pick-meta{font:var(--t-micro);color:var(--ink-3)}

/* Profile */
.pl-profile-head{display:flex;align-items:center;gap:22px;padding:8px 20px 14px}
.pl-profile-stats{display:flex;gap:22px;flex:1}
.pl-profile-stats>div{display:flex;flex-direction:column;align-items:center;gap:2px}
.pl-profile-stats strong{font:var(--t-h3);color:var(--ink-1)}
.pl-profile-stats span{font:var(--t-meta);color:var(--ink-3)}
.pl-profile-meta{padding:0 20px 14px}
.pl-profile-handle{font:var(--t-body);font-weight:600;margin:0;color:var(--ink-1)}
.pl-profile-bio{font:var(--t-body);color:var(--ink-2);margin:4px 0 8px}
.pl-profile-cats{display:flex;gap:6px;flex-wrap:wrap}
.pl-tag-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 8px;border:1px solid var(--line);background:var(--paper-0);border-radius:var(--r-pill);font:var(--t-meta);color:var(--ink-2)}
.pl-profile-actions{display:flex;gap:8px;padding:0 20px 12px}
.pl-btn{border:none;padding:0 18px;height:38px;border-radius:var(--r-pill);font:var(--t-body-sm);font-weight:600;transition:all var(--t-fast) var(--ease-out)}
.pl-btn-grow{flex:1}
.pl-btn-secondary{background:var(--paper-2);color:var(--ink-1)}
.pl-btn-secondary:active{background:var(--paper-3)}
.pl-btn-primary{background:var(--accent);color:var(--paper-0)}
.pl-btn-primary:active{background:var(--accent-press)}
.pl-btn-sm{height:30px;padding:0 14px;font-size:12px}
.pl-icon-tabs{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft)}
.pl-icon-tabs button{background:transparent;border:none;padding:12px 0;color:var(--ink-3);display:flex;align-items:center;justify-content:center;position:relative}
.pl-icon-tabs button.on{color:var(--ink-1)}
.pl-icon-tabs button.on::after{content:"";position:absolute;bottom:-1px;left:25%;right:25%;height:2px;background:var(--ink-1);border-radius:2px}
.pl-profile-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;padding:2px 0}
.pl-profile-tile{position:relative}
.pl-profile-tile-cap{position:absolute;left:0;right:0;bottom:0;padding:6px 8px;font:var(--t-micro);color:var(--paper-0);background:linear-gradient(transparent,rgba(31,26,20,.6))}
.pl-profile-tile .pl-thumb{border-radius:0}

/* Discover */
.pl-search-wrap{position:relative;margin:4px 20px 8px}
.pl-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-3)}
.pl-search-input{width:100%;height:44px;padding:0 14px 0 40px;background:var(--paper-2);border:1px solid transparent;border-radius:var(--r-pill);font:var(--t-body);color:var(--ink-1);outline:none;transition:all var(--t-base) var(--ease-out)}
.pl-search-input:focus{border-color:var(--accent);background:var(--paper-0);box-shadow:0 0 0 3px var(--accent-soft)}
.pl-search-input::placeholder{color:var(--ink-3)}
.pl-chip-row{display:flex;flex-wrap:wrap;gap:6px}
.pl-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px 7px 8px;background:var(--paper-0);border:1px solid var(--line-soft);border-radius:var(--r-pill);font:var(--t-body-sm);color:var(--ink-1);box-shadow:var(--sh-1)}
.pl-chip-num{font-family:"Manrope",sans-serif;font-weight:700;color:var(--accent);width:14px;text-align:center;font-size:13px;line-height:1}
.pl-people-list{display:flex;flex-direction:column;gap:4px}
.pl-person-row{display:flex;align-items:center;gap:12px;padding:10px 0}
.pl-person-body{flex:1;min-width:0}
.pl-person-name{font:var(--t-body);font-weight:600;color:var(--ink-1)}
.pl-person-bio{font:var(--t-meta);color:var(--ink-3);margin-top:2px}
.pl-cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pl-cat-card{display:flex;align-items:center;gap:12px;padding:16px;background:var(--paper-0);border:1px solid var(--line-soft);border-radius:var(--r-lg);box-shadow:var(--sh-1)}
.pl-cat-label{font:var(--t-body);font-weight:600;color:var(--ink-1)}

/* Save Sheet */
.pl-sheet-root{position:absolute;inset:0;z-index:20;background:rgba(31,26,20,.32);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity var(--t-base) var(--ease-out)}
.pl-sheet-root.open{opacity:1;pointer-events:auto}
.pl-sheet{background:var(--paper-1);width:100%;border-radius:var(--r-xl) var(--r-xl) 0 0;padding:8px 0 32px;max-height:88%;overflow-y:auto;transform:translateY(20px);transition:transform var(--t-slow) var(--ease-out);box-shadow:var(--sh-lift)}
.pl-sheet-root.open .pl-sheet{transform:translateY(0)}
.pl-sheet-grabber{width:36px;height:4px;background:var(--ink-4);opacity:.4;border-radius:4px;margin:6px auto 8px}
.pl-sheet-head{display:flex;align-items:center;justify-content:space-between;padding:6px 20px 16px;border-bottom:1px solid var(--line-soft)}
.pl-sheet-title{font:var(--t-h3);color:var(--ink-1)}
.pl-sheet-body{padding:16px 20px 0;display:flex;flex-direction:column;gap:14px}
.pl-sheet-body .pl-pill-tabs{align-self:flex-start}
.pl-field{display:flex;flex-direction:column;gap:6px}
.pl-field label{font:var(--t-micro);color:var(--ink-3);letter-spacing:.04em;text-transform:uppercase}
.pl-input-with-icon{position:relative}
.pl-input-with-icon svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-3)}
.pl-input-with-icon .pl-input{padding-left:40px}
.pl-input{width:100%;height:44px;padding:0 14px;background:var(--paper-0);border:1px solid var(--line);border-radius:var(--r-md);font:var(--t-body);color:var(--ink-1);outline:none;transition:all var(--t-base) var(--ease-out)}
.pl-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.pl-textarea{width:100%;padding:12px 14px;background:var(--paper-0);border:1px solid var(--line);border-radius:var(--r-md);font:var(--t-body);color:var(--ink-1);outline:none;resize:none}
.pl-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.pl-preview-card{display:flex;gap:12px;align-items:center;padding:12px;background:var(--paper-0);border:1px solid var(--line-soft);border-radius:var(--r-md)}
.pl-preview-body{flex:1;min-width:0}
.pl-preview-title{font:var(--t-body-sm);font-weight:600;color:var(--ink-1)}
.pl-preview-meta{font:var(--t-micro);color:var(--ink-3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-mono)}
.pl-folder-pickrow{display:flex;gap:6px;flex-wrap:wrap}
.pl-folder-pick{display:inline-flex;align-items:center;gap:6px;padding:6px 12px 6px 10px;background:var(--paper-0);border:1px solid var(--line);border-radius:var(--r-pill);font:var(--t-body-sm);color:var(--ink-2);transition:all var(--t-fast) var(--ease-out)}
.pl-folder-pick.on{background:var(--ink-1);color:var(--paper-0);border-color:var(--ink-1)}

/* Toast */
.pl-toast{position:absolute;left:50%;bottom:110px;transform:translate(-50%,20px);display:inline-flex;align-items:center;gap:10px;background:var(--ink-1);color:var(--paper-0);padding:12px 20px;border-radius:var(--r-pill);font:var(--t-body-sm);font-weight:500;box-shadow:var(--sh-3);opacity:0;pointer-events:none;transition:all var(--t-base) var(--ease-out);white-space:nowrap;z-index:30}
.pl-toast.on{opacity:1;transform:translate(-50%,0)}
.pl-toast-check{width:18px;height:18px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pl-toast-check svg{width:11px;height:11px;stroke:var(--paper-0);fill:none}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ── Icons ── */
const IC = {
  home:    '<path d="m3 12 9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/>',
  search:  '<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>',
  plus:    '<path d="M12 5v14M5 12h14"/>',
  bookmark:'<path d="m6 3 12 0a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/>',
  user:    '<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>',
  bell:    '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>',
  share:   '<path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="m16 6-4-4-4 4"/><path d="M12 2v13"/>',

function Icon({ name, size = 22, className = '' }) {
  return (
    <svg viewBox="0 0 24 24" width={size} height={size} fill="none"
         stroke="currentColor" strokeWidth="1.75" strokeLinecap="round"
         strokeLinejoin="round" className={className}
         dangerouslySetInnerHTML={{ __html: IC[name] ?? '' }} />
  );
}

/* ── TopBar ── */
function TopBar({ title, right, leftBack, onBack }) {
  return (
    <div className="pl-topbar">
      {leftBack
        ? <button className="pl-iconbtn" onClick={onBack}><Icon name="back" /></button>
        : <div className="pl-wordmark">Pick<span className="pl-wordmark-dot" />Log</div>
      }
      <div className="pl-topbar-title">{title}</div>
      <div className="pl-topbar-right">
        {right ?? <button className="pl-iconbtn"><Icon name="bell" /></button>}
      </div>
    </div>
  );
}

/* ── TabBar ── */
function TabBar({ tab, onTab, onSave }) {
  const item = (key, icon, label) => (
    <button key={key} className="pl-tab" data-on={String(tab === key)} onClick={() => onTab(key)}>
      <Icon name={icon} size={22} />
      <span>{label}</span>
    </button>
  );
  return (
    <div className="pl-tabbar">
      {item('home', 'home', '홈')}
      {item('discover', 'search', '검색')}
      <div className="pl-tab-spacer">
        <button className="pl-fab" onClick={onSave}><Icon name="plus" size={22} /></button>
        <span className="pl-fab-label">저장</span>
      </div>
      {item('library', 'bookmark', '보관함')}
      {item('profile', 'user', '마이')}
    </div>
  );
}

/* ── Save Sheet ── */
const FOLDERS = [{name:'패션',c:'fashion'},{name:'뷰티',c:'beauty'},{name:'식품',c:'food'},{name:'기타',c:'etc'}];
function SaveSheet({ open, onClose, onSaved }) {
  const [mode, setMode] = useState('link');
  const [url, setUrl] = useState('');
  const [note, setNote] = useState('');
  const [folder, setFolder] = useState('패션');
  const [privacy, setPrivacy] = useState('public');
  useEffect(() => { if (!open) { setUrl(''); setNote(''); } }, [open]);
  return (
    <div className={`pl-sheet-root${open?' open':''}`} onClick={onClose}>
      <div className="pl-sheet" onClick={e=>e.stopPropagation()}>
        <div className="pl-sheet-grabber"/>
        <div className="pl-sheet-head">
          <button className="pl-text-btn" onClick={onClose}>취소</button>
          <div className="pl-sheet-title">새 픽</div>
          <button className="pl-text-btn pl-text-btn-accent" disabled={!url} onClick={()=>{onSaved?.();onClose?.();}}>저장</button>
        </div>
        <div className="pl-sheet-body">
          <div className="pl-pill-tabs">
            <button className={mode==='link'?'on':''} onClick={()=>setMode('link')}>링크</button>
            <button className={mode==='product'?'on':''} onClick={()=>setMode('product')}>상품</button>
          </div>
          <div className="pl-field">
            <label>URL</label>
            <div className="pl-input-with-icon">
              <Icon name="link" size={16}/>
              <input className="pl-input" placeholder="https://" value={url} onChange={e=>setUrl(e.target.value)}/>
            </div>
          </div>
          {url && (
            <div className="pl-preview-card">
              <div className="pl-thumb pl-thumb-md"><Icon name="imageOff" size={20}/></div>
              <div className="pl-preview-body">
                <div className="pl-preview-title">미리보기 — 가져오는 중</div>
                <div className="pl-preview-meta">{url.slice(0,36)||'—'}</div>
              </div>
            </div>
          )}
          <div className="pl-field">
            <label>폴더</label>
            <div className="pl-folder-pickrow">
              {FOLDERS.map(f => (
                <button key={f.name} className={`pl-folder-pick${folder===f.name?' on':''}`} onClick={()=>setFolder(f.name)}>
                  <span className="pl-cat-dot" data-cat={f.c}/>{f.name}
                </button>
              ))}
            </div>
          </div>
          <div className="pl-field">
            <label>노트 <span style={{color:'var(--ink-3)',fontSize:11}}>(선택)</span></label>
            <textarea className="pl-textarea" placeholder="이 픽에 대한 짧은 메모" value={note} onChange={e=>setNote(e.target.value)} rows={3}/>
          </div>
          <div className="pl-field">
            <label>공개 범위</label>
            <div className="pl-pill-tabs">
              <button className={privacy==='public'?'on':''} onClick={()=>setPrivacy('public')}>공개</button>
              <button className={privacy==='friends'?'on':''} onClick={()=>setPrivacy('friends')}>친구만</button>
              <button className={privacy==='private'?'on':''} onClick={()=>setPrivacy('private')}>비공개</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── App ── */
const SCREENS = { home: Home, discover: Discover, library: Library, profile: Profile };
function App() {
  const [tab, setTab] = useState('home');
  const [sheetOpen, setSheetOpen] = useState(false);
  const [toast, setToast] = useState(false);
  const handleSaved = () => { setToast(true); setTimeout(()=>setToast(false), 1800); };
  const Screen = SCREENS[tab] ?? Home;
  return (
    <div className="pl-app">
      <Screen />
      <TabBar tab={tab} onTab={setTab} onSave={()=>setSheetOpen(true)}/>
      <SaveSheet open={sheetOpen} onClose={()=>setSheetOpen(false)} onSaved={handleSaved}/>
      <div className={`pl-toast${toast?' on':''}`}>
        <span className="pl-toast-check">
          <svg fill="none" strokeWidth="2.5" viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round" stroke="currentColor">
            <path d="m5 12 5 5L20 7"/>
          </svg>
        </span>
        저장됨
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
